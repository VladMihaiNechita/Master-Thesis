run_id: eval_all_datasets_224
output_dir: results/eval_all_datasets_224
seed: 1729
wandb:
  enabled: false
  project: up-images-vit
model:
  name: vit_tiny_patch16_224
  image_size: 224
  patch_size: 16
mae:
  mask_ratio: 0.75
  decoder_embed_dim: 96
  decoder_depth: 2
  decoder_num_heads: 3
eval:
  image_size: 224
  batch_size: 32
  num_workers: 0
  embedding_modes:
  - cls_mean
  probes:
  - linear
  linear_epochs: 30
  linear_batch_size: 8192
  linear_lr: 0.1
  linear_weight_decay: 0.0001
  linear_optimizer: torch.optim.SGD
  linear_momentum: 0.9
  linear_loss: cross_entropy
  linear_device: cuda
  reconstruction_mae: true
datasets:
- name: cifar10
  root: data/cifar10
  cache_root: data/cache
  transform_policy: full_resize
- name: cifar100
  root: data/cifar100
  cache_root: data/cache
  transform_policy: full_resize
- name: tiny_imagenet
  path: data/tiny-imagenet-200
  train_split: train
  eval_split: test
  cache_root: data/cache
  transform_policy: full_resize
- name: imagenet1k
  root: data/imagenet
  eval_split: test
  cache_root: data/cache
  transform_policy: center_crop
  eval_batch_size: 128
  eval_num_workers: 0
- name: imagenet_r
  train_path: data/imagenet
  eval_path: data/imagenet-r
  eval_split: test
  cache_root: data/cache
  transform_policy: center_crop
  eval_batch_size: 128
