      quantize: true
      horizontal_flip_prob: 0.5
      vertical_flip_prob: 0.0
      kernel_size: 3
      dilation: 1
      multi_scale: false
      weight_std_min: 0.08
      weight_std_max: 0.08
      latent_pixel_channels: 0
      latent_lowres_channels: 0
      latent_global_channels: 0
      spectral_latent_channels: 0
      init_source: noise
      init_random_color_fraction: 0.1
      random_color_fraction: 0.005
      random_color_fraction_after: 0.0005
      random_color_fraction_switch_images: 10000000
      random_color_fraction_schedule: linear
      seed: 1746
