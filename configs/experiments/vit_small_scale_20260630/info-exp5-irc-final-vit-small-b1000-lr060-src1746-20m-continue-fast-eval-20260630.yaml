  group: info_exp5_vit_small_scale_20260630
  notes: Fast eval-only config for the 20M continuation ViT-Small run using the final/original exp5 IRC generator. LR = 0.8 * final ViT-Tiny exp5 LR 0.00075.
    Resume model/optimizer/scaler from the matching 2M validation-only pilot checkpoint; evaluate validation + test datasets.
    LR schedule uses lr_total_steps=20000 so the 2M pilot is the first segment of the 20M schedule; checkpoint_final stores
