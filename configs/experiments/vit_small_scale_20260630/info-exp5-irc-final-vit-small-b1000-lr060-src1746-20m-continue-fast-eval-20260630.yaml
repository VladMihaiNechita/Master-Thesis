  - srcseed1746
  - fast_eval_h100
model:
  name: vit_small_patch16_224
  image_size: 224
  patch_size: 16
mae:
  mask_ratio: 0.75
  decoder_embed_dim: 192
  decoder_depth: 4
  decoder_num_heads: 6
source:
  type: generator
  generator:
    name: irc_conv
    params:
      k: 2
      mode: random_generator_per_batch
      width: 16
      depth: 3
      buffer_size: 20000
      refresh_fraction: 0.025
      reset_fraction: 0.001
      reset_fraction_after: 0.0001
      reset_fraction_switch_images: 10000000
      reset_fraction_schedule: linear
      fourier_fraction: 0.05
      fourier_fraction_after: 0.05
      fourier_fraction_switch_images: 10000000
      fourier_fraction_schedule: linear
      output_fourier_fraction: 0.0
      output_noise_fraction: 0.0
      update_strength: 0.3
      update_strength_after: 0.15
      update_strength_switch_images: 10000000
      update_strength_schedule: linear
      quantize: true
      horizontal_flip_prob: 0.5
      vertical_flip_prob: 0.0
      kernel_size: 3
      dilation: 1
      multi_scale: false
      weight_std_min: 0.08
      weight_std_max: 0.08
      latent_pixel_channels: 0
      latent_lowres_channels: 0
      latent_global_channels: 0
      spectral_latent_channels: 0
      init_source: noise
      init_random_color_fraction: 0.1
      random_color_fraction: 0.005
      random_color_fraction_after: 0.0005
      random_color_fraction_switch_images: 10000000
      random_color_fraction_schedule: linear
      seed: 1746
